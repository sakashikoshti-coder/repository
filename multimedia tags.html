<!DOCTYPE html>
<html>
<head>
    <title>Multimedia Tags Example</title>
</head>
<body>

    <h2>Image</h2>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRtuwnDKbuWLwCNVC92jsnoGesewBNR8z-a4A&s.jpg" alt="Flower" width="300">

    <h2>Audio</h2>
    <audio controls>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <h2>Video</h2>
    <video width="400" controls>
        <source src="video.mp4" type="video/mp4">
    </video>

    <h2>YouTube Video</h2>
    <iframe
        width="400"
        height="250"
        src="https://www.youtube.com/embed/HcOc7P5BMi4?si=OZUYuXaMPrUaPCXI">
    </iframe>

</body>
</html>
