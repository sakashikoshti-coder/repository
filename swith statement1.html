<!DOCTYPE html>
<html>
<head>
    <title>Switch Statement Example 1</title>
</head>
<body>

    <h2>JavaScript Switch Statement</h2>

    <script>
        let grade=prompt("Enter your Grade:" );

        switch (grade) {
            case "A":
                document.write("Excellent!!");
                break;
            
            case "B":
                document.write("Good Job ");
                break;
                
            case "C":
                document.write("Fair, Need improvement");
                break;
               
            case "D":
                document.write("Poor,Srudy Harder");
                break;
                
            case "F":
                document.write("Fail");
                break;
                
            default:
                document.write("Invalid Grade");    
        }
</script>
</body> 
</html>
