<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cards</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

<section class="container">

    <!-- Card 1 -->
    <article class="card card1">
        <header>
            <h2>Gaming Laptop</h2>
        </header>

        <figure>
            <img src="/gaming laptop.jpg" alt="Gaming Laptop">
            <figcaption>High-performance Laptop</figcaption>
        </figure>

        <p>Intel Core i7, 16GB RAM, 512GB SSD.</p>

        <footer>
            <h3>₹69,999</h3>
            <button>Buy Now</button>
        </footer>
    </article>

    <!-- Card 2 -->
    <article class="card card2">
        <header>
            <h2>Wireless Headphones</h2>
        </header>

        <figure>
            <img src="/wireless headphones.jpg" alt="Headphones" ;>
            <figcaption>Noise Cancelling</figcaption>
        </figure>

        <p>Crystal clear sound with 30-hour battery backup.</p>

        <footer>
            <h3>₹3,499</h3>
            <button>Add to Cart</button>
        </footer>
    </article>

    <!-- Card 3 -->
    <article class="card card3">
        <header>
            <h2>Smart Watch</h2>
        </header>

        <figure>
            <img src="/smartwatch.jpg" alt="Smart Watch">
            <figcaption>Fitness Tracker</figcaption>
        </figure>

        <p>Heart-rate monitor, GPS and AMOLED display.</p>

        <footer>
            <h3>₹5,999</h3>
            <button>Shop Now</button>
        </footer>
    </article>

    <!-- Card 4 -->
    <article class="card card4">
        <header>
            <h2>DSLR Camera</h2>
        </header>

        <figure>
            <img src="/camera.jpg" alt="Camera" >
            <figcaption>Professional Photography</figcaption>
        </figure>

        <p>24MP camera with 4K video recording support.</p>

        <footer>
            <h3>₹45,999</h3>
            <button>Explore</button>
        </footer>
    </article>

</section>

</body>
</html>
