<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"content="width=device-width,initial-scale=1.0">
    <title>Product Advertisement Card</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background-color:antiquewhite;
            display:flex;
            justify-content:center;
            Align-items:center;
            height:100;
        }
        .card {
            width:320px;
            background:white;
            border-radius:15px;
            box-shadow:0 4px 10px rgba(0,0,0,2);
            text-align:center;
        }
        .card img {
            width:100%;
            height:220px;
            object-fit:cover;
        }
        .card-content{
            padding:20px;
        }
        .card h2 {
            color:#333;
            margin-bottom:10px;
        }
        .price{
            color:green;
            font-size:24px;
            font-weight:bold;
        }
        .offer{
            color:red;
            font-weight:bold;
            margin:10px 0;
        }
        .btn{
            display:inline-block;
            margin-top:15px;
            padding:10px 20px;
            background-color:bisque;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }
        .btn:hover{
            background-color:rgb(79, 69, 89)
        }
    </style>
</head>
<body> 
    <div class="card">
        <img src="" alt="product Image">
      <div class="card-content">
        <h2> wireless headphones</h2>
        <p> Experience crystal-clear sound with premium quality and long battery life</p>
        <p class="Price">1,999</p>
        <p class="Offer"> 30% OFF - Limited Time Offer !</p>
        <a href="#" class="btn">Buy Now</a>
      </div>  
    </div>
</body>
</html>
