<!DOCTYPE html>
<html>
<head>
    
    <title>Swith Statement Example 2 </title>
</head>
<body>

    <h2>The office Working days</h2>

    <script>
        let day=prompt("Enter your working day:")

        switch (day){

        case "Monday":
            document.write("Start of the work week");
            break;

        case"Tuesday":  
             document.write("Team Meeting day");
             break;
         
        case"Wednesday":
             document.write("Midweek check-in");
             break;
             
        case"Thurday":
             document.write("Project Review day");
             break;
             
        case"Friday":
             document.write("Weekend task");
             break;
             
        case"Saturday":
            document.write("Overview of the project ");
            break;
            
        case"Sunday":
            document.write("Holiday");
            break;
            
        default:
            document.write("Envalid day Entered")  
        }  




    </script>
    
</body>
</html>
