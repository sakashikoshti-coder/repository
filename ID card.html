<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student ID Card</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f0f0f0;
}

.card{
    width:900px;
    margin:30px auto;
    border:4px solid #003366;
    border-radius:20px;
    overflow:hidden;
    background:white;
}

.header{
    background:#003366;
    color:white;
    text-align:center;
    padding:20px;
}

.header h1{
    margin:0;
    font-size:40px;
}

.header h3{
    margin-top:10px;
    font-size:24px;
    font-weight:normal;
}

.content{
    display:flex;
    align-items:center;
    padding:30px;
}

.photo{
    width:220px;
    height:280px;
    border:3px solid #003366;
    border-radius:15px;
    overflow:hidden;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.details{
    margin-left:50px;
    font-size:28px;
    line-height:2;
}

.details b{
    color:#003366;
}

.footer{
    background:#f5e6cc;
    color:red;
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    border-top:3px solid #003366;
}
</style>

</head>
<body>


<div class="card">
    <div class="header">
        <h1>SMG KM Sangli</h1>
        <h3>Student Identity Card</h3>
    </div>

    <div class="content">
        <div class="photo">
            <img src="student.jpg" alt="Student Photo">
        </div>

        <div class="details">
            <p><b>Name :</b> Sakshi koshti</p>
            <p><b>Roll No :</b> 101</p>
            <p><b>Course :</b> Full Stack Development</p>
            <p><b>Blood Group :</b> B+</p>
            <p><b>Contact No :</b> 8010205842</p>
        </div>
    </div>

    <div class="footer">
        ⚠ ID Card is Mandatory in the Examination Hall ⚠
    </div>
</div>

</body>
</html>
