<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <style>
        {
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        

        .container{
            width:450px;
            background:#e9e9e9;
            padding:40px;
            border-radius:15px;
            text-align:center;
        }

        h1{
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:15px;
            margin:15px 0;
            border:none;
            border-radius:8px;
            font-size:18px;
        }

        button{
            width:100%;
            padding:15px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
            font-size:20px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        a{
            display:block;
            margin-top:15px;
            text-decoration:none;
            color:blue;
            font-size:18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Login</h1>

        <input type="text" placeholder="Username">

        <input type="password" placeholder="Password">

        <button>Login</button>

        <a href="#">Forgot Password?</a>
    </div>

</body>
</html>
