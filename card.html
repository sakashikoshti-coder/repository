<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <article class="card speaker">
        <h2>🔊 Bluetooth Speaker</h2>
        <img src="/bluetooth.jpg.webp" alt="Bluetooth Speaker">
        <p>Powerful sound with deep bass and 12-hour battery backup.</p>
        <h3>₹2,499</h3>
        <button>Buy Now</button>
    </article>

    <article class="card perfume">
        <h2>🌸 Luxury Perfume</h2>
        <img src="/perfume.jpg.jpg" alt="Perfume">
        <p>Long-lasting fragrance perfect for every occasion.</p>
        <h3>₹1,299</h3>
        <button>Shop Now</button>
    </article>

    <article class="card mouse">
        <h2>🖱 Gaming Mouse</h2>
        <img src="/gaming mouse.jpg" alt="Gaming Mouse">
        <p>RGB lighting with adjustable DPI for smooth gaming.</p>
        <h3>₹999</h3>
        <button>View Details</button>
    </article>

</div>

</body>
</html>
