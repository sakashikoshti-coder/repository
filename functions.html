<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Function Example</title>
</head>
<body>
    <h2>Output of the operation</h2>

    <script>
        function add(a, b) {
            return a + b;
        }

        document.write("Sum =", add(10, 20));    



        const multiply=(a,b)=>{
            return a*b;

        };
        document.write(multiply(4,5));
    </script>
</body>
</html>
